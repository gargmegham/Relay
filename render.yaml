services:
  # Telegram Bot Application
  - type: web
    name: telebot
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: telebot-db
          property: connectionString

databases:
  - name: telebot-db
    databaseName: taskbot
    plan: free
